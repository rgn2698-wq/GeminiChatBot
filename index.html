<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gemini Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #a8ff78;
      --accent2: #78ffd6;
      --text: #e8e8e8;
      --text-dim: #666;
      --user-bg: #1a2a1a;
      --ai-bg: #161616;
      --radius: 2px;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .logo-text {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-badge {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .status-badge.connected {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* API KEY SECTION */
    #api-section {
      position: relative;
      z-index: 10;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #api-section label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    #api-key-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 8px 12px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s;
    }

    #api-key-input:focus {
      border-color: var(--accent);
    }

    #api-key-input::placeholder {
      color: var(--text-dim);
    }

    .btn {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      background: var(--accent2);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    /* CHAT AREA */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.2s ease;
      max-width: 820px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.ai { align-self: flex-start; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .msg.user .msg-avatar {
      background: var(--user-bg);
      border: 1px solid #2a4a2a;
      color: var(--accent);
    }

    .msg.ai .msg-avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent2);
    }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: calc(100% - 44px);
    }

    .msg-role {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    .msg.user .msg-role { text-align: right; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid #2a4a2a;
      color: var(--text);
    }

    .msg.ai .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
      align-items: center;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-dim);
      text-align: center;
    }

    .empty-icon {
      font-size: 48px;
      opacity: 0.3;
    }

    .empty-title {
      font-family: var(--font-sans);
      font-size: 18px;
      font-weight: 600;
      color: var(--text-dim);
    }

    .empty-sub {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      opacity: 0.6;
    }

    /* INPUT AREA */
    #input-area {
      position: relative;
      z-index: 10;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      padding: 12px 16px;
      border-radius: var(--radius);
      outline: none;
      resize: none;
      max-height: 140px;
      min-height: 46px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-dim); }

    #send-btn {
      width: 46px;
      height: 46px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    #send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
    }

    .clear-btn {
      font-size: 11px;
      padding: 6px 12px;
    }

    /* error */
    .error-msg {
      font-family: var(--font-mono);
      font-size: 12px;
      color: #ff6b6b;
      padding: 10px 16px;
      background: #1a0a0a;
      border: 1px solid #3a1a1a;
      border-radius: var(--radius);
      animation: fadeIn 0.2s ease;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">GEMINI <span>CHAT</span></span>
  </div>
  <div class="header-right">
    <span class="status-badge" id="status-badge">NO API KEY</span>
    <button class="btn btn-ghost clear-btn" onclick="clearHistory()">CLEAR</button>
  </div>
</header>

<div id="api-section">
  <label>API KEY →</label>
  <input type="password" id="api-key-input" placeholder="Gemini API 키를 입력하세요" />
  <button class="btn btn-primary" onclick="setApiKey()">연결</button>
</div>

<div id="chat-area">
  <div id="empty-state">
    <div class="empty-icon">◈</div>
    <div class="empty-title">Gemini와 대화를 시작하세요</div>
    <div class="empty-sub">API 키를 입력하고 연결하면 채팅을 시작할 수 있습니다</div>
  </div>
</div>

<div id="input-area">
  <textarea id="user-input" placeholder="메시지를 입력하세요... (Shift+Enter: 줄바꿈)" rows="1"></textarea>
  <button class="btn btn-primary" id="send-btn" onclick="sendMessage()" disabled>↑</button>
</div>

<script>
  let apiKey = '';
  let history = [];
  let isLoading = false;

  const chatArea = document.getElementById('chat-area');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const statusBadge = document.getElementById('status-badge');
  const emptyState = document.getElementById('empty-state');

  // auto resize textarea
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
  });

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  function setApiKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val) return;
    apiKey = val;
    statusBadge.textContent = 'CONNECTED';
    statusBadge.classList.add('connected');
    sendBtn.disabled = false;
    document.getElementById('api-key-input').value = '';
  }

  function clearHistory() {
    history = [];
    chatArea.innerHTML = '';
    chatArea.appendChild(emptyState);
    emptyState.style.display = 'flex';
  }

  function appendMsg(role, text) {
    if (emptyState.style.display !== 'none') {
      emptyState.style.display = 'none';
    }

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? 'YOU' : 'AI';

    const content = document.createElement('div');
    content.className = 'msg-content';

    const roleLabel = document.createElement('div');
    roleLabel.className = 'msg-role';
    roleLabel.textContent = role === 'user' ? 'USER' : 'GEMINI';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    content.appendChild(roleLabel);
    content.appendChild(bubble);
    div.appendChild(avatar);
    div.appendChild(content);
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return bubble;
  }

  function appendTyping() {
    if (emptyState.style.display !== 'none') emptyState.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing-msg';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = 'AI';

    const content = document.createElement('div');
    content.className = 'msg-content';

    const roleLabel = document.createElement('div');
    roleLabel.className = 'msg-role';
    roleLabel.textContent = 'GEMINI';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble typing-indicator';
    bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

    content.appendChild(roleLabel);
    content.appendChild(bubble);
    div.appendChild(avatar);
    div.appendChild(content);
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-msg');
    if (el) el.remove();
  }

  function appendError(msg) {
    const div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = '⚠ ' + msg;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  async function sendMessage() {
    if (!apiKey) { alert('API 키를 먼저 입력하세요.'); return; }
    const text = userInput.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    userInput.value = '';
    userInput.style.height = 'auto';

    appendMsg('user', text);
    history.push({ role: 'user', parts: [{ text }] });

    appendTyping();

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: history })
        }
      );

      removeTyping();

      if (!res.ok) {
        const err = await res.json();
        appendError(err.error?.message || `HTTP ${res.status}`);
        history.pop();
      } else {
        const data = await res.json();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '(응답 없음)';
        appendMsg('ai', reply);
        history.push({ role: 'model', parts: [{ text: reply }] });
      }
    } catch (e) {
      removeTyping();
      appendError('네트워크 오류: ' + e.message);
      history.pop();
    }

    isLoading = false;
    sendBtn.disabled = false;
    userInput.focus();
  }
</script>
</body>
</html>
